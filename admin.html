<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty zone | Admin Panel</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            padding: 100px 5%;
            min-height: 70vh;
        }
        .admin-header {
            margin-bottom: 40px;
        }
        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        th {
            color: #d4af37;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">Beauty zone Admin</div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">View Site</a></li>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Appointments</a></li>
            </ul>
        </nav>
        <a href="#" class="btn-primary" onclick="alert('Logged out')">Logout</a>
    </header>

    <div class="admin-container">
        <div class="admin-header">
            <h2>Admin Dashboard</h2>
            <p>Manage your beauty parlor appointments and settings.</p>
        </div>
        
        <div class="admin-card">
            <h3>Recent Booking Requests</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Service</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="bookingsTableBody">
                    <!-- Data will be populated via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="logo">Beauty zone</div>
            <p>&copy; 2026 Beauty zone. All rights reserved.</p>
        </div>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.getElementById('bookingsTableBody');
            const bookings = JSON.parse(localStorage.getItem('parlorBookings')) || [];

            if (bookings.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No bookings yet!</td></tr>';
                return;
            }

            bookings.forEach(booking => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${booking.name}</td>
                    <td>${booking.email}</td>
                    <td>${booking.service}</td>
                    <td>${booking.date}</td>
                    <td><span style="color: #d4af37;">${booking.status}</span></td>
                `;
                tableBody.appendChild(tr);
            });
        });
    </script>
</body>
</html>
